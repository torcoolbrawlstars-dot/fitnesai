name: Build iOS IPA

# Собирает неподписанный .ipa на macOS-раннере GitHub.
# Запуск: вкладка Actions → "Build iOS IPA" → Run workflow (или пуш в main).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build web (Next static export)
        run: npm run build
        env:
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}

      - name: Copy web assets into iOS
        run: npx cap copy ios

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM=""

      - name: Package .app into .ipa
        run: |
          APP_PATH="$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App.app not found — archive failed"
            ls -R "$RUNNER_TEMP/App.xcarchive/Products" || true
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r -y BodyVisionAI-unsigned.ipa Payload >/dev/null
          echo "IPA_PATH=$RUNNER_TEMP/BodyVisionAI-unsigned.ipa" >> "$GITHUB_ENV"
          ls -lh BodyVisionAI-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodyVisionAI-unsigned-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
          retention-days: 30
